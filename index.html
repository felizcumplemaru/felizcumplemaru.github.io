<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>
    <div class="header">
        <h1>Feliz cumple mi amor 🎂🎂 este es tu regalito!</h1>
        <div>
            <h3>Cada Localidad 🇦🇷</h3>
            <span>@CadaLocalidad</span>
            <div>
                🛰️ Imágenes satelitales de localidades de Argentina.
                Dataset: BAHRA
                MapBox ©
            </div>
        </div>
    </div>
    <div class="body">
        <div class="tweet">
            <div class="profile-col">
                <img src="/img/cada_localidad_perfil.jpg" alt="" class="profile">
            </div>
            <div class="content-col">
                <span class="content-text">📍Vista Flores, Tunuyán, Mendoza</span>
                <img src="img/G-aQ9IHW4AA3PPN.jpg" alt="" class="content-img">
            </div>
        </div>
        <div class="map-container">
            <iframe
            width="100%"
            height="100%"
            style="border:0"
            loading="lazy"
            allowfullscreen
            referrerpolicy="no-referrer-when-downgrade"
            src="https://www.google.com/maps/embed/v1/place?key=AIzaSyCTpa_VK8zXZTzPxgU8mTBEmn421anAJYk
                &q=Argentina">
            </iframe>
        </div>
    </div>
</body>
</html>
