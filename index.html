<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
    <script
            src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA6myHzS10YXdcazAFalmXvDkrYCp5cLc8&libraries=maps,marker&v=weekly"
            defer></script>
</head>
<body>
    <div class="header">
        <h1>Feliz cumple mi amor 🎂🎂 este es tu regalito!</h1>
        <div>
            <h3>Cada Localidad 🇦🇷</h3>
            <span>@CadaLocalidad</span>
            <div>
                🛰️ Imágenes satelitales de localidades de Argentina.
                Dataset: BAHRA
                MapBox ©
            </div>
        </div>
    </div>
    <div class="body">
        <div class="tweet">
            <div class="profile-col">
                <img src="/img/cada_localidad_perfil.jpg" alt="" class="profile">
            </div>
            <div class="content-col">
                <span class="content-text">📍Vista Flores, Tunuyán, Mendoza</span>
                <img src="img/G-aQ9IHW4AA3PPN.jpg" alt="" class="content-img">
            </div>
        </div>
        <div class="map-container">
            <gmp-map
            center="37.4220656,-122.0840897"
            zoom="10"
            map-id="DEMO_MAP_ID"
            style="height: 500px"></gmp-map>
        </div>
    </div>
</body>
</html>
